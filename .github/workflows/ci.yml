name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly plugin-compatibility sweep (03:17 UTC).
    - cron: '17 3 * * *'

jobs:
  premium-guard:
    name: No premium code in free repo
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build (so build/ is present to scan)
        run: WP_EXPERIMENTAL_MODULES=true npm run build
      - name: Fail if AWT Premium code leaked in
        run: npm run check:premium

  lint:
    name: Lint (ESLint, PHPCS, markdownlint)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: Install npm dependencies
        run: npm ci
      - name: Install composer dependencies
        run: composer install --no-interaction --no-progress
      - name: ESLint
        run: npm run lint:js
      - name: PHPCS
        run: npm run lint:php
      - name: markdownlint
        run: npm run lint:md
      - name: carbonStyles declarations
        run: npm run check:carbon-styles

  test:
    name: Unit tests (Jest)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Jest
        run: npm run test:unit

  # wp-env mounts the sibling ../awt-theme (lockstep repos), so the jobs
  # that start wp-env check out both repos side by side.
  test-php:
    name: PHP tests (PHPUnit in wp-env)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: awt-blocks
    steps:
      - uses: actions/checkout@v4
        with:
          path: awt-blocks
      - uses: actions/checkout@v4
        with:
          repository: accessible-wordpress-theme/awt-theme
          path: awt-theme
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: awt-blocks/package-lock.json
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: Install npm dependencies
        run: npm ci
      - name: Install composer dependencies
        run: composer install --no-interaction --no-progress
      - name: Build blocks (registration reads build/)
        run: WP_EXPERIMENTAL_MODULES=true npm run build
      - name: Start wp-env
        run: npx wp-env start
      - name: PHPUnit
        run: npm run test:php

  e2e:
    name: E2E tests (Playwright in wp-env)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: awt-blocks
    steps:
      - uses: actions/checkout@v4
        with:
          path: awt-blocks
      - uses: actions/checkout@v4
        with:
          repository: accessible-wordpress-theme/awt-theme
          path: awt-theme
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: awt-blocks/package-lock.json
      - name: Install npm dependencies
        run: npm ci
      - name: Build blocks
        run: WP_EXPERIMENTAL_MODULES=true npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Start wp-env
        run: npx wp-env start
      - name: Playwright
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: awt-blocks/test-results/
          retention-days: 7

  perf:
    name: Performance budgets (Lighthouse)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    timeout-minutes: 30
    permissions:
      contents: write
    defaults:
      run:
        working-directory: awt-blocks
    env:
      REP_URL: "http://localhost:8888/?page_id=79"
      STRESS_URL: "http://localhost:8888/?page_id=7"
    steps:
      - uses: actions/checkout@v4
        with:
          path: awt-blocks
      - uses: actions/checkout@v4
        with:
          repository: accessible-wordpress-theme/awt-theme
          path: awt-theme
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: awt-blocks/package-lock.json
      - name: Install npm dependencies
        run: npm ci
      - name: Build blocks
        run: WP_EXPERIMENTAL_MODULES=true npm run build
      - name: Start wp-env
        run: npx wp-env start
      - name: Seed showcase content
        run: npm run env:seed
      - name: Restore previous gate status
        id: prev
        uses: actions/cache/restore@v4
        with:
          path: awt-blocks/.perf-status
          key: perf-status-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: perf-status-${{ github.ref_name }}-
      - name: Lighthouse (representative page)
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        continue-on-error: true
        with:
          urls: http://localhost:8888/?page_id=79
          configPath: ./awt-blocks/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false
      - name: Payload budgets (representative page)
        id: payloads
        continue-on-error: true
        run: node scripts/perf-payloads.js "$REP_URL"
      - name: Payload report (stress page, informational)
        run: node scripts/perf-payloads.js "$STRESS_URL" || echo "::warning::stress page over payload budget (informational)"
      - name: Editor overhead budget
        id: editor
        continue-on-error: true
        run: WP_BASE=http://localhost:8888 EDIT_PAGE_ID=79 OUT=/tmp/awt-perf bash scripts/perf-editor.sh
      - name: Two-consecutive-failure gate
        run: |
          THIS_RUN=pass
          [ "${{ steps.lighthouse.outcome }}" = "failure" ] && THIS_RUN=fail
          [ "${{ steps.payloads.outcome }}" = "failure" ] && THIS_RUN=fail
          [ "${{ steps.editor.outcome }}" = "failure" ] && THIS_RUN=fail
          PREV=$(cat .perf-status 2>/dev/null || echo pass)
          echo "$THIS_RUN" > .perf-status
          echo "previous run: $PREV — this run: $THIS_RUN"
          if [ "$THIS_RUN" = "fail" ] && [ "$PREV" = "fail" ]; then
            echo "::error::Performance budgets failed on two consecutive runs."
            exit 1
          fi
          if [ "$THIS_RUN" = "fail" ]; then
            echo "::warning::Performance budgets failed — a second consecutive failure will block."
          fi
      - name: Save gate status
        if: always()
        uses: actions/cache/save@v4
        with:
          path: awt-blocks/.perf-status
          key: perf-status-${{ github.ref_name }}-${{ github.run_id }}
      # The trend CSV lives on the unprotected perf-history branch: the
      # workflow bot can't push to main (required checks apply to it).
      # Read it with:  git log origin/perf-history -- docs/perf-history.csv
      - name: Append perf history (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          source /tmp/awt-perf/editor.env
          PAYLOADS=$(node scripts/perf-payloads.js "$REP_URL" --csv)
          ROW="$(date -u +%F),${GITHUB_SHA::7},$PERF_EDITOR_CSV,$PAYLOADS"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin perf-history:perf-history 2>/dev/null || true
          git checkout perf-history 2>/dev/null || git checkout -b perf-history
          mkdir -p docs
          [ -f docs/perf-history.csv ] || echo "date,sha,editor_tti_ms,editor_floor_tti_ms,editor_overhead_ms,editor_tbt_ms,css_kb_gz,js_kb_gz" > docs/perf-history.csv
          echo "$ROW" >> docs/perf-history.csv
          git add docs/perf-history.csv
          git commit -m "Append perf history row: $ROW"
          git push origin perf-history

  compat:
    name: Plugin compatibility (Floor A)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: awt-blocks
    steps:
      - uses: actions/checkout@v4
        with:
          path: awt-blocks
      - uses: actions/checkout@v4
        with:
          repository: accessible-wordpress-theme/awt-theme
          path: awt-theme
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: awt-blocks/package-lock.json
      - name: Install npm dependencies
        run: npm ci
      - name: Build blocks
        run: WP_EXPERIMENTAL_MODULES=true npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Start wp-env
        run: npx wp-env start
      - name: Compatibility specs (WooCommerce, Polylang, WP Super Cache)
        run: npm run test:compat
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: compat-traces
          path: awt-blocks/test-results/
          retention-days: 7
